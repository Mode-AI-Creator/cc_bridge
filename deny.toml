# cargo-deny 配置：依赖许可证 / 安全公告 / 来源合规审计。
# 本地运行：cargo install cargo-deny && cargo deny check

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# 允许的许可证（宽松系 + 常见弱 copyleft）。新增依赖若许可证不在此列，CI 会提示。
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
