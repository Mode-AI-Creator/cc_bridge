name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: ccbridge
            asset: ccbridge-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: ccbridge
            asset: ccbridge-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: ccbridge.exe
            asset: ccbridge-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend
        run: npm ci && npm run build
        working-directory: web
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build self-contained binary
        run: cargo build -p ccbridge-daemon --release --features embed-frontend --target ${{ matrix.target }}
      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          draft: true
          generate_release_notes: true
